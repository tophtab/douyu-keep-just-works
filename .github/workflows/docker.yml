name: Docker Build & Push

on:
  workflow_dispatch:
  push:
    branches: [master]
    tags: ['V*.*.*']

jobs:
  docker:
    runs-on: ubuntu-latest
    concurrency:
      group: docker-publish-${{ github.ref_name }}
      cancel-in-progress: false
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 18
          cache: 'npm'

      - name: Validate TypeScript
        run: |
          npm ci --ignore-scripts
          npm run type-check

      - name: Read Docker version tags
        id: version
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" =~ ^V([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
          else
            BASE_VERSION=$(node -p "require('./package.json').version")
            MINOR=$(node -e "const version = process.argv[1]; const parts = version.split('.'); if (parts.length !== 3) throw new Error('Invalid package.json version'); console.log(parts[0] + '.' + parts[1])" "$BASE_VERSION")
            BASE_PATCH=$(node -e "const version = process.argv[1]; const parts = version.split('.'); if (parts.length !== 3) throw new Error('Invalid package.json version'); console.log(parts[2])" "$BASE_VERSION")
            NEXT_PATCH=$(curl -fsSL "https://hub.docker.com/v2/namespaces/${DOCKERHUB_USERNAME}/repositories/douyu-keep-just-works/tags?page_size=100" | node -e "
              let body = '';
              process.stdin.on('data', (chunk) => body += chunk);
              process.stdin.on('end', () => {
                const minor = process.argv[1];
                const basePatch = Number(process.argv[2]);
                const results = JSON.parse(body).results || [];
                const regex = new RegExp('^' + minor.replace('.', '\\\\.') + '\\\\.(\\\\d+)$');
                let maxPatch = null;
                for (const tag of results) {
                  const match = String(tag.name || '').match(regex);
                  if (!match) {
                    continue;
                  }
                  const patch = Number(match[1]);
                  if (!Number.isInteger(patch)) {
                    continue;
                  }
                  maxPatch = maxPatch === null ? patch : Math.max(maxPatch, patch);
                }
                console.log(maxPatch === null ? basePatch : maxPatch + 1);
              });
            " "$MINOR" "$BASE_PATCH")
            VERSION="${MINOR}.${NEXT_PATCH}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/douyu-keep-just-works
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
