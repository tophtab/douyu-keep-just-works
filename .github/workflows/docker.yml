name: Docker Build & Push

on:
  workflow_dispatch:
  push:
    branches: [master]
    tags: ['V*.*.*', 'v*.*.*']
    paths:
      - '.github/workflows/docker.yml'
      - '.dockerignore'
      - 'Dockerfile'
      - 'package.json'
      - 'package-lock.json'
      - 'eslint.config.mjs'
      - 'tsconfig.docker.json'
      - 'tsconfig.webui.json'
      - 'vite.config.ts'
      - 'src/**'
      - 'test/**'
  pull_request:
    branches: [master]
    paths:
      - '.github/workflows/docker.yml'
      - '.dockerignore'
      - 'Dockerfile'
      - 'package.json'
      - 'package-lock.json'
      - 'eslint.config.mjs'
      - 'tsconfig.docker.json'
      - 'tsconfig.webui.json'
      - 'vite.config.ts'
      - 'src/**'
      - 'test/**'

permissions:
  contents: read

concurrency:
  group: docker-publish-${{ github.ref_name }}
  cancel-in-progress: false

env:
  IMAGE_NAME: tophtab/douyu-keep-just-works
  DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'master' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      push: ${{ steps.docker-tags.outputs.push }}
      channel: ${{ steps.docker-tags.outputs.channel }}
      tags: ${{ steps.docker-tags.outputs.tags }}
      labels: ${{ steps.docker-tags.outputs.labels }}
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Contract tests
        run: npm run test:contracts

      - name: Build Docker runtime
        run: npm run build:docker

      - name: Prepare Docker tags
        id: docker-tags
        run: |
          set -euo pipefail

          IMAGE="${IMAGE_NAME}"
          DEFAULT_BRANCH="${DEFAULT_BRANCH:-master}"
          PUSH="false"
          VERSION="ci"
          CHANNEL="ci"
          TAGS=()

          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_TYPE}" == "tag" ]]; then
            if [[ "${GITHUB_REF_NAME}" =~ ^[vV]([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
              VERSION="${BASH_REMATCH[1]}"
            else
              echo "Release tags must use Vx.y.z or vx.y.z, for example V2.2.0." >&2
              exit 1
            fi
            TAGS=("${IMAGE}:${VERSION}" "${IMAGE}:latest")
            CHANNEL="release"
            PUSH="true"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_TYPE}" == "branch" && "${GITHUB_REF_NAME}" == "${DEFAULT_BRANCH}" ]]; then
            VERSION="edge"
            TAGS=("${IMAGE}:edge")
            CHANNEL="edge"
            PUSH="true"
          fi

          {
            echo "push=${PUSH}"
            echo "channel=${CHANNEL}"
            echo "tags<<EOF"
            printf '%s\n' "${TAGS[@]}"
            echo "EOF"
            echo "labels<<EOF"
            echo "org.opencontainers.image.title=douyu-keep-just-works"
            echo "org.opencontainers.image.description=Douyu fan medal Docker WebUI"
            echo "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
            echo "org.opencontainers.image.revision=${GITHUB_SHA}"
            echo "org.opencontainers.image.version=${VERSION}"
            echo "org.opencontainers.image.ref.name=${GITHUB_REF_NAME}"
            echo "org.opencontainers.image.channel=${CHANNEL}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  docker:
    needs: validate
    if: github.event_name != 'push' || github.ref_type != 'tag'
    runs-on: ubuntu-latest
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: needs.validate.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ needs.validate.outputs.push }}
          tags: ${{ needs.validate.outputs.tags }}
          labels: ${{ needs.validate.outputs.labels }}
          provenance: ${{ needs.validate.outputs.push }}
          sbom: ${{ needs.validate.outputs.push }}
          cache-from: type=gha,scope=docker-amd64
          cache-to: type=gha,mode=max,scope=docker-amd64

  release-platform:
    needs: validate
    if: needs.validate.outputs.channel == 'release'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ needs.validate.outputs.labels }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          provenance: true
          sbom: true
          cache-from: type=gha,scope=docker-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.arch }}

      - name: Export digest
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  release-manifest:
    needs:
      - validate
      - release-platform
    if: needs.validate.outputs.channel == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create multi-arch release manifest
        run: |
          set -euo pipefail

          mapfile -t PUBLIC_TAGS <<'TAGS'
          ${{ needs.validate.outputs.tags }}
          TAGS

          tag_args=()
          for tag in "${PUBLIC_TAGS[@]}"; do
            if [[ -n "${tag}" ]]; then
              tag_args+=(--tag "${tag}")
            fi
          done

          sources=()
          for digest in /tmp/digests/*; do
            sources+=("${IMAGE_NAME}@sha256:$(basename "${digest}")")
          done

          docker buildx imagetools create "${tag_args[@]}" "${sources[@]}"

  fnos-fpk:
    needs:
      - validate
      - release-manifest
    if: needs.validate.outputs.channel == 'release'
    permissions:
      contents: write
    uses: ./.github/workflows/fnos-fpk.yml
    with:
      release_tag: ${{ github.ref_name }}
